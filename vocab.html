<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocab & Grammar - IELTS Practice Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafafa; --surface: #ffffff; --border: #e5e5e5;
      --text: #1a1a1a; --text2: #6b6b6b; --text3: #999;
      --blue: #2563eb; --blue-bg: #eff6ff;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    .topnav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; display: flex; align-items: center; height: 56px;
      position: sticky; top: 0; z-index: 100;
    }
    .topnav-brand { font-weight: 700; font-size: 1.05rem; margin-right: 32px; white-space: nowrap; text-decoration: none; color: var(--text); }
    .topnav-brand span { color: var(--blue); }
    .topnav-links { display: flex; gap: 4px; overflow-x: auto; }
    .topnav-links a {
      padding: 8px 14px; border-radius: 6px; font-size: 0.82rem; font-weight: 500;
      text-decoration: none; color: var(--text2); white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .topnav-links a:hover { background: var(--bg); color: var(--text); }
    .topnav-links a.active { background: var(--blue-bg); color: var(--blue); }

    .center {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; padding: 48px 24px; text-align: center;
    }
    .center .icon { font-size: 3rem; margin-bottom: 4px; }
    .center h1 { font-size: 1.5rem; font-weight: 700; }
    .center p { color: var(--text2); max-width: 400px; font-size: 0.9rem; line-height: 1.6; }
    .tag {
      display: inline-block; background: #f5f5f5; border: 1px solid var(--border);
      padding: 5px 14px; border-radius: 16px; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase; color: var(--text3);
    }

    @media (max-width: 640px) {
      .topnav { padding: 0 12px; }
      .topnav-brand { font-size: 0.95rem; margin-right: 16px; }
      .topnav-links a { padding: 6px 10px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <a class="topnav-brand" href="index.html">IELTS <span>Hub</span></a>
    <div class="topnav-links">
      <a href="index.html">Dashboard</a>
      <a href="listening.html">Listening</a>
      <a href="reading.html">Reading</a>
      <a href="writing.html">Writing</a>
      <a href="speaking.html">Speaking</a>
      <a href="shadowing.html">Shadowing</a>
      <a href="vocab.html" class="active">Vocab</a>
    </div>
  </nav>
  <div class="center">
    <div class="icon">&#x1F4DA;</div>
    <h1>Vocab & Grammar</h1>
    <p>Vocabulary and grammar exercises are being prepared. Check back soon!</p>
    <div class="tag">Coming soon</div>
  </div>
</body>
</html>
