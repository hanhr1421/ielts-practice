<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Listening — IELTS Practice Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0f0e0d; --paper: #f5f0e8; --cream: #ede7d9; --accent: #c8402a;
      --blue: #1a4a6e; --blue-light: #deeaf5;
      --success: #1a6a3a; --success-bg: #d4f0df; --error-bg: #fde8e4; --error: #c8402a;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

    /* old header removed — using topnav */

    .page-header { padding: 36px 48px 28px; border-bottom: 1px solid #ccc; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .page-header-left .label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--blue); margin-bottom: 8px; }
    .page-header-left h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 900; letter-spacing: -0.02em; }
    .page-header-left p { color: #666; font-size: 0.88rem; margin-top: 6px; }
    .student-badge { background: var(--blue-light); color: var(--blue); padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }

    .layout { display: flex; min-height: calc(100vh - 180px); }
    .sidebar { width: 240px; flex-shrink: 0; border-right: 1px solid #ccc; padding: 24px 0; position: sticky; top: 0; height: calc(100vh - 64px); overflow-y: auto; }
    .sidebar-section { padding: 8px 20px 4px; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #999; }
    .test-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 10px 20px; background: none; border: none; text-align: left; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: #555; transition: background 0.15s; }
    .test-btn:hover { background: var(--cream); color: var(--ink); }
    .test-btn.active { background: var(--ink); color: var(--paper); font-weight: 500; }
    .test-tag { font-size: 0.65rem; padding: 2px 7px; border-radius: 10px; background: var(--blue-light); color: var(--blue); }
    .test-btn.active .test-tag { background: #ffffff22; color: #fff; }
    .test-tag.soon { background: var(--cream); color: #aaa; }

    .content { flex: 1; padding: 36px 48px; max-width: 860px; }

    .test-header { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1.5px solid #ddd; }
    .test-header .test-label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--blue); margin-bottom: 6px; }
    .test-header h2 { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 6px; }
    .test-header p { font-size: 0.85rem; color: #666; line-height: 1.6; }

    .section-block { margin-bottom: 36px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .section-header { background: var(--blue); color: white; padding: 14px 20px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; }
    .section-qs { font-size: 0.78rem; opacity: 0.75; margin-top: 2px; }

    .audio-wrap { background: #1a2a3a; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .audio-label { font-size: 0.72rem; color: #7a9abf; white-space: nowrap; font-weight: 500; letter-spacing: 0.05em; }
    .audio-wrap audio { flex: 1; height: 34px; }
    .audio-note { font-size: 0.7rem; color: #6a8aaa; padding: 6px 20px 10px; background: #162230; }

    .questions-area { padding: 20px; }
    .q-group { margin-bottom: 24px; }
    .q-group-label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); margin-bottom: 4px; }
    .q-group-instruction { font-size: 0.85rem; color: #555; font-style: italic; margin-bottom: 14px; line-height: 1.5; }

    /* MCQ */
    .mcq-item { margin-bottom: 16px; }
    .mcq-stem { font-size: 0.9rem; margin-bottom: 8px; line-height: 1.5; display: flex; gap: 8px; align-items: baseline; }
    .mcq-options { display: flex; flex-direction: column; gap: 4px; margin-left: 32px; }
    .mcq-option { display: flex; align-items: flex-start; gap: 10px; padding: 7px 12px; border-radius: 4px; cursor: pointer; font-size: 0.87rem; transition: background 0.1s; border: 1.5px solid transparent; }
    .mcq-option:hover { background: var(--cream); }
    .mcq-option input { margin-top: 2px; accent-color: var(--blue); flex-shrink: 0; }
    .mcq-option.correct-hl { background: var(--success-bg) !important; border-color: var(--success); }
    .mcq-option.wrong-hl { background: var(--error-bg) !important; border-color: var(--error); }

    /* FORM */
    .form-box { background: #fffdf8; border: 1.5px solid #ccc; border-radius: 6px; padding: 18px 20px; margin-bottom: 10px; font-size: 0.88rem; line-height: 2; }
    .form-title { font-weight: 700; text-align: center; margin-bottom: 12px; font-size: 0.9rem; letter-spacing: 0.08em; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
    .form-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .form-row-label { font-weight: 600; min-width: 120px; font-size: 0.83rem; }

    /* CHECKBOX */
    .checkbox-list { border: 1.5px solid #ccc; border-radius: 6px; overflow: hidden; }
    .checkbox-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid #eee; font-size: 0.88rem; cursor: pointer; transition: background 0.1s; }
    .checkbox-item:last-child { border-bottom: none; }
    .checkbox-item:hover { background: var(--cream); }
    .checkbox-item input { accent-color: var(--blue); width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .checkbox-key { font-weight: 700; min-width: 22px; color: var(--blue); }
    .example-row { background: #f0ece4; color: #999; font-style: italic; cursor: default; }
    .checkbox-item.correct-hl { background: var(--success-bg) !important; }
    .checkbox-item.wrong-hl { background: var(--error-bg) !important; }

    /* NOTE BOX */
    .note-box { background: #fffdf8; border: 1.5px solid #ccc; border-radius: 6px; padding: 16px 20px; margin-bottom: 10px; font-size: 0.88rem; line-height: 2.1; }
    .note-section-title { font-size: 0.75rem; font-weight: 700; background: var(--ink); color: white; padding: 2px 8px; border-radius: 2px; display: inline-block; margin-bottom: 8px; letter-spacing: 0.05em; }
    .note-line { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; font-size: 0.88rem; line-height: 1.7; }

    /* INPUTS */
    .q-num-badge { font-size: 0.7rem; font-weight: 700; color: var(--blue); background: var(--blue-light); border-radius: 10px; padding: 1px 7px; white-space: nowrap; flex-shrink: 0; }
    .text-input { padding: 5px 10px; border: 1.5px solid #ccc; border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 0.87rem; background: white; transition: border-color 0.15s; }
    .text-input:focus { outline: none; border-color: var(--blue); }
    .text-input.correct { border-color: var(--success); background: var(--success-bg); }
    .text-input.incorrect { border-color: var(--error); background: var(--error-bg); }

    /* SUBMIT + RESULT */
    .submit-bar { margin-top: 40px; padding: 28px 32px; background: var(--cream); border-radius: 8px; border: 1.5px solid #ccc; }
    .submit-bar h3 { font-family: 'Playfair Display', serif; font-size: 1.15rem; margin-bottom: 6px; }
    .submit-bar p { font-size: 0.83rem; color: #666; margin-bottom: 18px; }
    .submit-btn { padding: 13px 32px; background: var(--blue); color: white; border: none; border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
    .submit-btn:hover { opacity: 0.88; }

    #result-box { margin-top: 20px; display: none; border-radius: 8px; }
    #result-box.show { display: block; animation: fadeIn 0.4s ease; }
    .result-header { padding: 22px 26px; border-radius: 8px 8px 0 0; display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
    .result-excellent { background: var(--success-bg); border: 1.5px solid #a0d8b4; }
    .result-good { background: #fef9e0; border: 1.5px solid #d4b800; }
    .result-ok { background: var(--error-bg); border: 1.5px solid #f0b8a8; }
    .result-score { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 900; line-height: 1; }
    .result-right { flex: 1; }
    .result-msg { font-size: 0.95rem; font-weight: 500; margin-bottom: 3px; }
    .result-sub { font-size: 0.8rem; color: #555; }
    .result-breakdown { border: 1.5px solid #ddd; border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
    .bd-title { padding: 12px 18px; background: var(--ink); color: var(--paper); font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; }
    .bd-title span { margin-left: auto; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 400; opacity: 0.65; }
    .bd-row { display: grid; grid-template-columns: 52px 1fr 1fr 1fr; border-bottom: 1px solid #eee; font-size: 0.8rem; align-items: center; }
    .bd-row:last-child { border-bottom: none; }
    .bd-row.hdr { background: #f8f4ec; font-size: 0.68rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: #888; }
    .bd-row.err-row { background: #fff8f7; }
    .bd-cell { padding: 8px 12px; line-height: 1.4; }
    .bd-num { font-weight: 600; color: #999; font-size: 0.75rem; border-right: 1px solid #eee; text-align: center; }
    .bd-given-wrong { color: var(--error); font-weight: 500; text-decoration: line-through; opacity: 0.7; }
    .bd-correct-ans { color: var(--success); font-weight: 600; }
    .retry-btn { margin-top: 14px; padding: 10px 24px; background: var(--ink); color: var(--paper); border: none; border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; }
    .retry-btn:hover { opacity: 0.8; }

    .coming-soon { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 14px; color: #aaa; text-align: center; }
    .coming-soon h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #bbb; }

    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid #ccc; display: flex; flex-wrap: wrap; padding: 12px; gap: 6px; }
      .sidebar-section { display: none; }
      .test-btn { width: auto; padding: 8px 14px; border-radius: 4px; font-size: 0.8rem; }
      .content, header, .page-header { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>

// ── ALL 41 QUESTIONS + ANSWERS ────────────────────────────────────────────────
const TESTS = {

              { num: 38, stem: "According to the speaker, a tutorial",
                options: ["A — is a type of lecture.", "B — is less important than a lecture.", "C — provides a chance to share views.", "D — provides an alternative to groupwork."],
                answer: "C" },
              { num: 39, stem: "When writing essays, the speaker advises students to",
                options: ["A — research their work well.", "B — name the books they have read.", "C — share work with their friends.", "D — avoid using other writers' ideas."],
                answer: "B" },
              { num: 40, stem: "The speaker thinks that plagiarism is",
                options: ["A — a common problem.", "B — an acceptable risk.", "C — a minor concern.", "D — a serious offence."],
                answer: "D" },
              { num: 41, stem: "The speaker's aims are to",
                options: ["A — introduce students to university expectations.", "B — introduce students to the members of staff.", "C — warn students about the difficulties of studying.", "D — guide students round the university."],
                answer: "A" }
            ]
          }
        ]
      }
    ]
  }
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentTest = 't1';
let answers = {};
let checkboxSel = {}; // groupId -> Set of selected keys

// ── GOOGLE DRIVE AUDIO ───────────────────────────────────────────────────────
const SHEET_URL = "https://script.google.com/macros/s/AKfycbwL3uhZasnCex4w6izyOzTlMc7jRRo7PkH6co0zpM-A1-mtkGqjdLCCn7UyWtK_PF4Rpw/exec";
let driveAudioCache = {}; // cambridge -> { fileName: driveUrl }

async function fetchDriveAudio(cambridge) {
  if (driveAudioCache[cambridge]) return driveAudioCache[cambridge];
  try {
    const r = await fetch(SHEET_URL + '?action=audio&cambridge=' + cambridge);
    const data = await r.json();
    const map = {};
    (data.files || []).forEach(f => { map[f.name] = f.url; });
    driveAudioCache[cambridge] = map;
    return map;
  } catch (e) { return {}; }
}

function resolveDriveAudio(localPath, audioMap) {
  // localPath like "audio/Test_1_-_Section_1.mp3"
  // Try to match against Drive file names like "Test1_Section1.mp3"
  if (!audioMap || Object.keys(audioMap).length === 0) return localPath;
  const match = localPath.match(/Test[_\s]*(\d+)[_\s]*[-]*[_\s]*Section[_\s]*(\d+)/i);
  if (!match) return localPath;
  const t = match[1], s = match[2];
  // Try common naming patterns
  const patterns = [
    `Test${t}_Section${s}.mp3`,
    `Test_${t}_-_Section_${s}.mp3`,
    `Test${t}_Section${s}.MP3`
  ];
  for (const p of patterns) {
    if (audioMap[p]) return audioMap[p];
  }
  // Fuzzy: find any file containing TestX and SectionY
  for (const [name, url] of Object.entries(audioMap)) {
    if (name.includes('Test' + t) && name.includes('Section' + s)) return url;
  }
  return localPath;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function loadTest(id) {
  currentTest = id;
  answers = {};
  checkboxSel = {};
  document.querySelectorAll('.test-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + id).classList.add('active');
  const content = document.getElementById('main-content');
  if (!TESTS[id]) {
    content.innerHTML = `<div class="coming-soon"><div style="font-size:3rem">🚧</div><h3>Coming Soon</h3><p>This test is being prepared.</p></div>`;
    return;
  }
  const test = TESTS[id];
  let html = `<div class="test-header">
    <div class="test-label">Academic Listening · Cambridge Practice Tests for IELTS 1</div>
    <h2>${test.title}</h2>
    <p>4 sections · 40 questions · Listen to each audio then answer the questions below it. Submit when all done.</p>
  </div>`;
  test.sections.forEach(sec => { html += renderSection(sec); });
  html += `<div class="submit-bar">
    <h3>Submit your answers</h3>
    <p>Answered all questions? Click below — your score and corrections will appear immediately.</p>
    <button class="submit-btn" onclick="submitTest()">Submit Test 1 →</button>
  </div>
  <div id="result-box"></div>`;
  content.innerHTML = html;
  window.scrollTo(0, 0);

  // Resolve audio from Google Drive (async, updates audio sources after render)
  fetchDriveAudio("1").then(audioMap => {
    test.sections.forEach(sec => {
      const driveUrl = resolveDriveAudio(sec.audio, audioMap);
      if (driveUrl !== sec.audio) {
        const audioEl = document.getElementById('audio-s' + sec.num);
        if (audioEl) { audioEl.src = driveUrl; audioEl.load(); }
        const noteEl = document.getElementById('audio-note-s' + sec.num);
        if (noteEl) { noteEl.textContent = 'Audio loaded from Google Drive'; noteEl.style.color = '#4a9'; }
      } else {
        const noteEl = document.getElementById('audio-note-s' + sec.num);
        if (noteEl) { noteEl.textContent = 'Using local audio file'; }
      }
    });
  });
}

function renderSection(sec) {
  let html = `<div class="section-block">
    <div class="section-header">
      <div class="section-title">Section ${sec.num}</div>
      <div class="section-qs">${sec.qRange}</div>
    </div>
    <div class="audio-wrap">
      <span class="audio-label">AUDIO</span>
      <audio controls preload="none" style="flex:1;height:34px" id="audio-s${sec.num}">
        <source src="${sec.audio}" type="audio/mpeg"/>
        Audio not supported.
      </audio>
    </div>
    <div class="audio-note" id="audio-note-s${sec.num}">Loading audio from Google Drive...</div>
    <div class="questions-area">`;
  sec.groups.forEach(g => { html += renderGroup(g); });
  html += `</div></div>`;
  return html;
}

function renderGroup(g) {
  let html = `<div class="q-group">
    <div class="q-group-label">${g.label}</div>
    <div class="q-group-instruction">${g.instruction}</div>`;

  if (g.type === 'mcq') {
    g.questions.forEach(q => {
      html += `<div class="mcq-item">
        <div class="mcq-stem">
          <span class="q-num-badge">${q.num}</span>
          ${q.stem}
        </div>
        <div class="mcq-options">
          ${q.options.map((opt, i) => {
            const L = String.fromCharCode(65+i);
            return `<label class="mcq-option" id="opt-${q.num}-${L}">
              <input type="radio" name="q${q.num}" value="${L}" onchange="answers[${q.num}]='${L}'"/>
              ${opt}
            </label>`;
          }).join('')}
        </div>
      </div>`;
    });
  }

  else if (g.type === 'form') {
    html += `<div class="form-box"><div class="form-title">${g.title}</div>`;
    g.fields.forEach(f => {
      html += `<div class="form-row">
        <span class="form-row-label">${f.rowLabel}</span>
        ${f.prefix ? `<span>${f.prefix}</span>` : ''}
        <span class="q-num-badge">(${f.num})</span>
        <input class="text-input" id="inp-${f.num}" type="text" placeholder="${f.placeholder}" style="width:${f.width}"
          oninput="answers[${f.num}]=this.value.trim()"/>
        ${f.extra ? `
          <span class="q-num-badge">(${f.extra.num})</span>
          <input class="text-input" id="inp-${f.extra.num}" type="text" placeholder="${f.extra.placeholder}" style="width:${f.extra.width}"
            oninput="answers[${f.extra.num}]=this.value.trim()"/>
          <span>${f.extra.suffix}</span>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  else if (g.type === 'checkbox') {
    html += `<div style="font-size:0.78rem;color:#888;font-style:italic;margin-bottom:8px">Example: B — Money promised for drought victims ✓</div>`;
    html += `<div class="checkbox-list">`;
    g.items.forEach(item => {
      if (item.example) {
        html += `<div class="checkbox-item example-row">
          <input type="checkbox" disabled checked/>
          <span class="checkbox-key">${item.key}</span>
          ${item.text} (example)
        </div>`;
      } else {
        html += `<label class="checkbox-item" id="chk-${g.id}-${item.key}">
          <input type="checkbox" value="${item.key}" onchange="toggleChk('${g.id}','${item.key}',this.checked)"/>
          <span class="checkbox-key">${item.key}</span>
          ${item.text}
        </label>`;
      }
    });
    html += `</div>`;
  }

  else if (g.type === 'notes') {
    if (g.noteTitle) html += `<div style="font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;font-style:italic;margin-bottom:10px">${g.noteTitle}</div>`;
    g.boxes.forEach(box => {
      html += `<div class="note-box">`;
      if (box.sectionTitle) html += `<div class="note-section-title">${box.sectionTitle}</div>`;
      box.lines.forEach(line => {
        if (line.num) {
          html += `<div class="note-line">
            <span>${line.text}</span>
            <span class="q-num-badge">${line.num}</span>
            <input class="text-input" id="inp-${line.num}" type="text" placeholder="${line.placeholder||'answer…'}" style="width:160px"
              oninput="answers[${line.num}]=this.value.trim()"/>
            ${line.suffix ? `<span>${line.suffix}</span>` : ''}
          </div>`;
        } else {
          html += `<div style="font-size:0.87rem;color:#444;line-height:1.7">${line.text}</div>`;
        }
      });
      html += `</div>`;
    });
  }

  html += `</div>`;
  return html;
}

function toggleChk(groupId, key, checked) {
  if (!checkboxSel[groupId]) checkboxSel[groupId] = new Set();
  if (checked) checkboxSel[groupId].add(key);
  else checkboxSel[groupId].delete(key);
}

// ── SCORING ───────────────────────────────────────────────────────────────────
function norm(s) { return (s||'').toLowerCase().replace(/[£$()]/g,'').replace(/\s+/g,' ').trim(); }
function match(given, expected) {
  const g = norm(given);
  return expected.split('//').some(v => {
    const e = norm(v);
    return g === e || g.includes(e) || e.includes(g);
  });
}

function scoreTest() {
  const test = TESTS[currentTest];
  let rows = [];

  test.sections.forEach(sec => {
    sec.groups.forEach(g => {
      if (g.type === 'mcq') {
        g.questions.forEach(q => {
          const given = answers[q.num] || '';
          const ok = given.toUpperCase() === q.answer;
          rows.push({ num: q.num, qText: q.stem.slice(0,50)+(q.stem.length>50?'…':''), given: given||'—', expected: q.answer, ok });
          q.options.forEach((_, i) => {
            const L = String.fromCharCode(65+i);
            const el = document.getElementById(`opt-${q.num}-${L}`);
            if (!el) return;
            el.classList.remove('correct-hl','wrong-hl');
            if (L === q.answer) el.classList.add('correct-hl');
            else if (L === given && !ok) el.classList.add('wrong-hl');
          });
        });
      }

      else if (g.type === 'form') {
        g.fields.forEach(f => {
          const score1 = { num: f.num, given: answers[f.num]||'', expected: f.answer };
          score1.ok = match(score1.given, score1.expected);
          rows.push({ num: f.num, qText: `Form: ${f.rowLabel}`, given: score1.given||'—', expected: f.answer, ok: score1.ok });
          const el = document.getElementById(`inp-${f.num}`);
          if (el) { el.classList.remove('correct','incorrect'); el.classList.add(score1.ok?'correct':'incorrect'); }
          if (f.extra) {
            const given2 = answers[f.extra.num]||'';
            const ok2 = match(given2, f.extra.answer);
            rows.push({ num: f.extra.num, qText: `Form: street name`, given: given2||'—', expected: f.extra.answer, ok: ok2 });
            const el2 = document.getElementById(`inp-${f.extra.num}`);
            if (el2) { el2.classList.remove('correct','incorrect'); el2.classList.add(ok2?'correct':'incorrect'); }
          }
        });
      }

      else if (g.type === 'checkbox') {
        const sel = checkboxSel[g.id] || new Set();
        const correct = new Set(g.answers);
        g.answers.forEach(ans => {
          const ok = sel.has(ans);
          rows.push({ num: `11-13(${ans})`, qText: g.items.find(i=>i.key===ans)?.text||ans, given: ok?'✓ ticked':'— not ticked', expected: 'Tick ✓', ok });
          const el = document.getElementById(`chk-${g.id}-${ans}`);
          if (el) el.classList.add(ok?'correct-hl':'wrong-hl');
        });
        sel.forEach(s => {
          if (!correct.has(s)) {
            rows.push({ num: `11-13(${s})`, qText: `Incorrect tick: ${s}`, given: '✓ (wrong)', expected: 'Do not tick', ok: false });
            const el = document.getElementById(`chk-${g.id}-${s}`);
            if (el) el.classList.add('wrong-hl');
          }
        });
      }

      else if (g.type === 'notes') {
        g.boxes.forEach(box => {
          box.lines.forEach(line => {
            if (!line.num) return;
            const given = answers[line.num]||'';
            const ok = match(given, line.answer);
            rows.push({ num: line.num, qText: line.text.replace(/[()]/g,'').slice(0,50), given: given||'—', expected: line.answer.split('//')[0], ok });
            const el = document.getElementById(`inp-${line.num}`);
            if (el) { el.classList.remove('correct','incorrect'); el.classList.add(ok?'correct':'incorrect'); }
          });
        });
      }
    });
  });

  return rows;
}

function submitTest() {
  const name = localStorage.getItem('studentName') || 'Unknown';
  const rows = scoreTest();
  const total = rows.length;
  const correct = rows.filter(r => r.ok).length;
  const pct = Math.round((correct/total)*100);
  const wrong = rows.filter(r => !r.ok);

  const resultBox = document.getElementById('result-box');
  const cls = pct>=80?'result-excellent':pct>=60?'result-good':'result-ok';
  const emoji = pct>=80?'🎉':pct>=60?'👍':'📚';
  const msg = pct>=80?'Excellent listening!':pct>=60?'Good work — review the mistakes below.':'Keep practising — listen again carefully.';

  resultBox.className = 'show';
  resultBox.innerHTML = `
    <div class="result-header ${cls}">
      <div class="result-score">${correct}<span style="font-size:1.8rem;opacity:0.5"> / ${total}</span></div>
      <div class="result-right">
        <div class="result-msg">${emoji} ${pct}% — ${msg}</div>
        <div class="result-sub">${wrong.length===0?'Perfect score! No mistakes.':`${wrong.length} mistake${wrong.length>1?'s':''} to review · ${correct} correct`}</div>
      </div>
    </div>
    ${wrong.length>0?`
    <div class="result-breakdown">
      <div class="bd-title">❌ Mistakes to review <span>${wrong.length} items</span></div>
      <div class="bd-row hdr">
        <div class="bd-cell bd-num">#</div>
        <div class="bd-cell">Question</div>
        <div class="bd-cell">Your answer</div>
        <div class="bd-cell">Correct answer</div>
      </div>
      ${wrong.map(r=>`
        <div class="bd-row err-row">
          <div class="bd-cell bd-num">${r.num}</div>
          <div class="bd-cell" style="color:#444;font-size:0.78rem">${r.qText}</div>
          <div class="bd-cell bd-given-wrong">${r.given}</div>
          <div class="bd-cell bd-correct-ans">✓ ${r.expected}</div>
        </div>`).join('')}
    </div>`:''}
    <button class="retry-btn" onclick="loadTest('${currentTest}')">↩ Try again</button>`;

  resultBox.scrollIntoView({ behavior: 'smooth', block: 'start' });

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwL3uhZasnCex4w6izyOzTlMc7jRRo7PkH6co0zpM-A1-mtkGqjdLCCn7UyWtK_PF4Rpw/exec';
  if (SCRIPT_URL !== 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
    fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name, unit:'Test 1 Listening', correct, total, pct, section:'Listening', timestamp: new Date().toISOString() })
    }).catch(()=>{});
  }
}

window.addEventListener('DOMContentLoaded', () => {
  const name = localStorage.getItem('studentName') || 'Student';
  document.getElementById('student-badge').textContent = name;
  loadTest('t1');
});
</script>
